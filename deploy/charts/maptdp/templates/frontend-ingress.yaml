{{- if and .Values.frontend.enabled .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "maptdp.fullname" . }}-ingress
  labels:
    {{- include "maptdp.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: "le"
spec:
  {{- if .Values.frontend.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.frontend.ingress.host }}
      secretName: {{ include "maptdp.fullname" . }}-tls
  {{- end }}

  rules:
    - host: {{ .Values.frontend.ingress.host }}
      http:
        paths:

          # ==========================================
          # 1) SERVE THE FRONTEND SPA AT /
          # ==========================================
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "maptdp.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}

          # ==========================================
          # 2) /api → FRONTEND → NGINX PROXY_PASS → BACKEND PRIVÉ
          # ==========================================
          {{- if .Values.frontend.ingress.api.enabled }}
          - path: {{ .Values.frontend.ingress.api.path | default "/api" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "maptdp.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
          {{- end }}

{{- end }}