{{- if and .Values.frontend.enabled .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "maptdp.fullname" . }}-ingress
  labels:
    {{- include "maptdp.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.frontend.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.frontend.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.frontend.ingress.host }}
      secretName: {{ include "maptdp.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.frontend.ingress.host }}
      http:
        paths:
          # Frontend à la racine
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "maptdp.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}

          {{- if and .Values.backend.enabled .Values.frontend.ingress.api.enabled }}
          # Backend routé via /api sur le même host
          - path: {{ .Values.frontend.ingress.api.path | default "/api" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "maptdp.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
          {{- end }}
{{- end }}