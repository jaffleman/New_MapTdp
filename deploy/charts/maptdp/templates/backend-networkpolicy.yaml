{{- if .Values.backend.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "maptdp.fullname" . }}-backend-deny-all-except-traefik
  labels:
    {{- include "maptdp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Autoriser Traefik (adapte labels/namespace de ton Traefik)
    - from:
        - namespaceSelector:
            matchLabels:
              # ⚠️ adapte selon ton cluster : namespace où tourne Traefik
              kubernetes.io/metadata.name: traefik
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: {{ .Values.backend.service.port }}
    # Autoriser le DNS (optionnel si ton app backend résout des hôtes externes)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  egress:
    # Autoriser DNS sortant
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # (Optionnel) Autoriser Postgres (si DB interne)
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: database } }
          podSelector: { matchLabels: { app: postgres } }
      ports:
        - protocol: TCP
          port: 5432
{{- end }}