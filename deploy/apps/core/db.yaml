apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maptdp-db
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd-image-updater.argoproj.io/image-list: db=docker.io/jaffleman971/maptdp-db

    # ✅ stratégie adaptée pipeline actuel
    argocd-image-updater.argoproj.io/db.update-strategy: latest

    # ✅ accepte tous les tags
    argocd-image-updater.argoproj.io/db.allow-tags: regexp:^[a-zA-Z0-9._-]+$

    # ✅ GitOps
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main

    # ✅ mapping Helm (OBLIGATOIRE)
    argocd-image-updater.argoproj.io/db.helm.image-name: db.image.repository
    argocd-image-updater.argoproj.io/db.helm.image-tag: db.image.tag

spec:
  project: default
  source:
    repoURL: https://github.com/jaffleman/New_MapTdp.git
    targetRevision: main
    path: deploy/charts/maptdp-db
  destination:
    server: https://kubernetes.default.svc
    namespace: maptdp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true