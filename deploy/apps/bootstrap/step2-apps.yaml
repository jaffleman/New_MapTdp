apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: step2-apps
  namespace: argocd
  annotations:
    argocd.openshift.io/sync-wave: "3" # ◄ Troisième vague
spec:
  project: default
  source:
    repoURL: 'https://github.com/jaffleman/New_MapTdp.git'
    targetRevision: HEAD
    path: deploy/apps/user-services
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true