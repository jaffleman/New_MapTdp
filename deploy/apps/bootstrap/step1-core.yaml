apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: step1-core
  namespace: argocd
  annotations:
    argocd.openshift.io/sync-wave: "2" # ◄ Deuxième vague
spec:
  project: default
  source:
    repoURL: 'https://github.com/jaffleman/New_MapTdp.git'
    targetRevision: HEAD
    path: deploy/app/infra/core
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: k8s-core
  syncPolicy:
    automated:
      prune: true
      selfHeal: true