apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"

spec:
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: prometheusagents.monitoring.coreos.com
  project: default

  source:
    repoURL: https://github.com/prometheus-operator/prometheus-operator
    targetRevision: release-0.72
    path: example/prometheus-operator-crd   # ✅ contient uniquement les CRDs

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: false

    retry:
      limit: 5

    syncOptions:
      - Replace=true
