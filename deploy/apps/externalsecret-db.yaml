apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: maptdp-db-sync
  namespace: maptdp
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: "1h"
  dependency: 
    - name: vault-backend
      namespace: maptdp
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: maptdp-db-auth
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: maptdp/db
        property: password

    - secretKey: user
      remoteRef:
        key: maptdp/db
        property: user

    - secretKey: db
      remoteRef:
        key: maptdp/db
        property: db
