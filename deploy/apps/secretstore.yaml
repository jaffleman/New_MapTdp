apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: maptdp
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    vault:
      server: "https://vault.jaffleman.tech:8200"
      path: "k3s"
      version: "v2"
      auth:
        appRole:
          path: "approle"
          roleId: "934c09a0-e27e-b308-597a-301b9071e5fd"
          secretRef:
            name: vault-approle-token
            key: secret-id