apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maptdp-front-dev
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "3"
    # ✅ image à surveiller (sans semver)
    argocd-image-updater.argoproj.io/image-list: |
      frontend=docker.io/jaffleman971/maptdp-frontend

    # ✅ stratégie : prendre le dernier tag disponible
    argocd-image-updater.argoproj.io/frontend.update-strategy: latest

    # ✅ filtrer uniquement les tags SHA
    argocd-image-updater.argoproj.io/frontend.allow-tags: regexp:^sha-

    # ✅ écriture dans Git (GitOps)
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main

    # ✅ mapping Helm → où modifier image
    argocd-image-updater.argoproj.io/frontend.helm.image-name: frontend.image.repository
    argocd-image-updater.argoproj.io/frontend.helm.image-tag: frontend.image.tag

spec:
  project: default

  source:
    repoURL: https://github.com/jaffleman/New_MapTdp.git
    targetRevision: main
    path: deploy/charts/maptdp-frontend
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: maptdp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true