{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontend.fullname" . }}-env
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
data:
  env.js: |
    window.__RUNTIME_CONFIG__ = {
      API_BASE_URL: "{{ .Values.runtimeConfig.apiBaseUrl }}"
    };
{{- end }}