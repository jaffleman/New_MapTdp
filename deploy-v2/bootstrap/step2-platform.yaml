apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: step2-platform
  namespace: argocd
  annotations:
    argocd.openshift.io/sync-wave: "3" # ◄ Troisième vague
spec:
  project: default
  source:
    repoURL: 'https://github.com/jaffleman/New_MapTdp.git'
    targetRevision: new_infra
    path: deploy-v2/argocd/platform
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: platform
    createNamespace: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true