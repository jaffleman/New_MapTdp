apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: step1-infra
  namespace: argocd
  annotations:
    argocd.openshift.io/sync-wave: "2" # ◄ Deuxième vague
spec:
  project: default
  source:
    repoURL: 'https://github.com/jaffleman/New_MapTdp.git'
    targetRevision: new_infra
    path: deploy-v2/argocd/infra
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true