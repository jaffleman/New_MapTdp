apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: infra
  labels:
    app.kubernetes.io/name: argocd-image-updater
data:
  config.yaml: |
    # Adresse du serveur ArgoCD
    argocd:
      serverAddress: argocd-server.argocd.svc.cluster.local
      insecure: false

    # Stratégie de commit automatique
    git:
      writeBackMethod: git
      commitUser: "ArgoCD Image Updater"
      commitEmail: "image-updater@local"
      signingKey: ""
      branchSuffix: "image-updater"

    # Configuration des registries
    registries:
      - name: dockerhub
        api_url: https://registry-1.docker.io
        prefix: docker.io
        default: true
        credentials: secret:dockerhub-creds

      - name: ghcr
        api_url: https://ghcr.io
        prefix: ghcr.io
        credentials: secret:ghcr-creds

    # Paramètres globaux
    logLevel: info
    updateStrategy: semver
    pullSecret: ""
    interval: 2m

    # Policies par défaut
    policies:
      semver:
        range: ">0.0.0"
      latest:
        allowTags: ["latest"]
      digest:
        force: true
