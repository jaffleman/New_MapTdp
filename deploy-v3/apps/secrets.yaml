apiVersion: v1
kind: Namespace
metadata:
  name: maptdp
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: maptdp
  annotations:
    argocd.argoproj.io/sync-wave: "1"

spec:
  provider:
    vault:
      server: "https://vault.jaffleman.tech:8200"
      path: "k3s"
      version: "v2"
      auth:
        appRole:
          path: "approle"
          roleId: "934c09a0-e27e-b308-597a-301b9071e5fd"
          secretRef:
            name: vault-approle-token
            key: secret-id
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: maptdp-db-sync
  namespace: maptdp
  annotations:
    argocd.argoproj.io/sync-wave: "1"

spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: maptdp-db-auth
  data:
    - secretKey: password
      remoteRef:
        key: maptdp/db
        property: password
    - secretKey: user
      remoteRef:
        key: maptdp/db
        property: user
    - secretKey: db
      remoteRef:
        key: maptdp/db
        property: db
