apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maptdp-back-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # ✅ image à surveiller (sans semver)
    argocd-image-updater.argoproj.io/image-list: |
      backend=docker.io/jaffleman971/maptdp-backend

    # ✅ stratégie = prendre le dernier tag disponible
    argocd-image-updater.argoproj.io/backend.update-strategy: latest

    # ✅ filtrer uniquement les tags sha
    argocd-image-updater.argoproj.io/backend.allow-tags: regexp:^sha-

    # ✅ commit dans Git (GitOps)
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main

    # ✅ mapping Helm → où modifier l'image
    argocd-image-updater.argoproj.io/backend.helm.image-name: backend.image.repository
    argocd-image-updater.argoproj.io/backend.helm.image-tag: backend.image.tag

spec:
  project: default

  source:
    repoURL: https://github.com/jaffleman/New_MapTdp.git
    targetRevision: main
    path: deploy/charts/maptdp-backend
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: maptdp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true