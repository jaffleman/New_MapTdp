server {
    listen 80;

    resolver 10.43.0.10 valid=10s;
    resolver_timeout 5s;

    root /usr/share/nginx/html;
    index index.html;

    # --- FRONTEND (SPA) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- BACKEND PROXY ---
    location /api/ {
        proxy_pass http://{{ .Values.backend.host }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.port }}/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Origin "";
    }
}
