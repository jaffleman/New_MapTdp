server {
    listen 80;

    # Racine des fichiers statiques
    root /usr/share/nginx/html;

    index index.html;

    # ============ FRONTEND (SPA) ============
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============ BACKEND PROXY =============
    # Toutes les requêtes commençant par /api
    # sont envoyées au backend Kubernetes privé
    location /api/ {
        proxy_pass http://maptdp-dev-maptdp-backend.maptdp.svc.cluster.local:8000/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Nécessaire si ton backend fait du CORS (peu probable)
        proxy_set_header Origin "";
    }
}