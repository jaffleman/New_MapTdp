name: Build & Push Frontend Image (Docker Hub)

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
    paths:
      - "frontend/**"
      - ".github/workflows/build-frontend-dockerhub.yml"

  pull_request:
    branches: [ "main" ]
    paths:
      - "frontend/**"

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: jaffleman971/maptdp-frontend

jobs:
  build:
    name: Build (PR) / Build & Push (main, tags)
    runs-on: ubuntu-latest

    # 🔥 NE S’EXÉCUTE QUE SI des fichiers frontend ont été modifiés
    if: |
      github.event_name == 'pull_request' ||
      (
        startsWith(github.ref, 'refs/tags/v') &&
        (
          contains(join(github.event.commits.*.modified, ','), 'frontend/') ||
          contains(join(github.event.commits.*.added, ','), 'frontend/') ||
          contains(join(github.event.commits.*.removed, ','), 'frontend/') ||
          contains(join(github.event.commits.*.modified, ','), '.github/workflows/build-frontend-dockerhub.yml')
        )
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps & run tests (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm test --if-present -- --watchAll=false || echo "no tests yet"

      - name: Build production (frontend)
        working-directory: frontend
        env:
          CI: "true"
        run: |
          npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=MapTdp Frontend
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build (PR) / Build & Push (main, tags)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max