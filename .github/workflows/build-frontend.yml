name: Build & Push Frontend Image (Docker Hub)

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"
      - ".github/workflows/build-frontend.yml"

  pull_request:
    branches: [ "main" ]
    paths:
      - "frontend/**"

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: jaffleman971/maptdp-frontend

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      # ------------------------ CHECKOUT ------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------ DETECT CHANGES ------------------------
      - name: Detect frontend changes
        id: changes
        run: |
          git fetch --force

          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep "^frontend/" || true)

          if [[ -n "$CHANGED" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      # ------------------------ SKIP IF NO CHANGE ------------------------
      - name: Stop workflow if frontend unchanged
        if: steps.changes.outputs.changes == 'false' && github.event_name != 'pull_request'
        run: |
          echo "Aucun changement frontend → build ignoré."
          exit 0

      # ------------------------ NODE ------------------------
      - name: Use Node 24
        if: steps.changes.outputs.changes == 'true' || github.event_name == 'pull_request'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps & test
        working-directory: frontend
        if: steps.changes.outputs.changes == 'true' || github.event_name == 'pull_request'
        run: |
          npm ci
          npm test --if-present -- --watchAll=false || echo "no tests yet"

      - name: Build
        working-directory: frontend
        env:
          CI: "true"
        if: steps.changes.outputs.changes == 'true' && github.event_name != 'pull_request'
        run: |
          npm run build

      # ------------------------ DOCKER ------------------------
      - name: Set up QEMU
        if: steps.changes.outputs.changes == 'true' || github.event_name == 'pull_request'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.changes.outputs.changes == 'true' || github.event_name == 'pull_request'  
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        if: steps.changes.outputs.changes == 'false' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        if: steps.changes.outputs.changes == 'true' || github.event_name == 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build & Push
        if: steps.changes.outputs.changes == 'true' || github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}