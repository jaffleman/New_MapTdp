name: Build & Push Backend Image (Docker Hub)

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
    paths:
      - "backend/**"
      - ".github/workflows/build-backend.yml"

  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: jaffleman971/maptdp-backend

jobs:
  build:
    name: Build backend
    runs-on: ubuntu-latest

    steps:
      # ------------------------ CHECKOUT ------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------ DETECT CHANGES ------------------------
      - name: Detect backend changes
        id: changes
        run: |
          git fetch --tags --force

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "Tag detected: ${GITHUB_REF_NAME}"

            PREV=$(git rev-parse "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
            [[ -z "$PREV" ]] && PREV="HEAD~1"

            CHANGED=$(git diff --name-only "$PREV" HEAD | grep "^backend/" || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep "^backend/" || true)
          fi

          if [[ -n "$CHANGED" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      # ------------------------ SKIP IF NO CHANGE ------------------------
      - name: Stop workflow if backend unchanged
        if: steps.changes.outputs.changes == 'false' && github.event_name != 'pull_request'
        run: |
          echo "Aucun changement backend → build ignoré."
          exit 0

      # ------------------------ NODE ------------------------
      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps & test
        working-directory: backend
        run: |
          npm ci
          npm test --if-present || echo "no tests yet"

      # ------------------------ DOCKER ------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}